services:
  mysql:
    image: mysql:8.0
    container_name: billing-mysql
    restart: always
    environment:
      MYSQL_ROOT_PASSWORD: password
      MYSQL_DATABASE: billing_db
    ports:
      - "3306:3306"
    volumes:
      - mysql_data:/var/lib/mysql

  phpmyadmin:
    image: phpmyadmin:latest
    container_name: billing-phpmyadmin
    restart: always
    ports:
      - "8081:80"
    environment:
      PMA_HOST: mysql
      PMA_USER: root
      PMA_PASSWORD: password
    depends_on:
      - mysql

  redis:
    image: redis:alpine
    container_name: billing-redis
    restart: always
    ports:
      - "6379:6379"

  backend:
    build:
      context: ./server
      dockerfile: Dockerfile
    container_name: billing-backend
    volumes:
      - ./server:/app
      - /app/node_modules
    ports:
      - "5000:5000"
    environment:
      - PORT=5000
      - DATABASE_URL=mysql://root:password@mysql:3306/billing_db
      - REDIS_HOST=redis
      - REDIS_PORT=6379
      - NODE_ENV=development
    depends_on:
      - mysql
      - redis

  frontend:
    build:
      context: ./web
      dockerfile: Dockerfile
    container_name: billing-frontend
    volumes:
      - ./web:/app
      - /app/node_modules
    ports:
      - "5173:5173"
    environment:
      - VITE_API_URL=http://localhost:5000
      - VITE_DEV_MODE=development
      - VITE_PROD_MODE=production
      - NODE_ENV=development
    depends_on:
      - backend

volumes:
  mysql_data:
